<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jin's Python Editor</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root { --main-color: #FFCF00; --bg-color: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; border-bottom: 2px solid #444; }
        .btn-run { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #editor-container { flex: 2; width: 100%; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; font-size: 16px; white-space: pre-wrap; }
        .loader-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="loader" class="loader-mask">🐍 파이썬 엔진을 깨우는 중...</div>

    <header>
        <div style="color:var(--main-color); font-weight:bold;">Jin's Editor</div>
        <button id="run-btn" class="btn-run" onclick="runPython()">▶ 실행 (Run)</button>
    </header>

    <div id="editor-container"></div>
    <div id="console"># 실행 결과창</div>

    <script>
        let pyodide = null;
        let editor = null;

        // 엔진과 에디터를 순서대로 로드
        async function init() {
            try {
                // 파이썬 로드
                pyodide = await loadPyodide();
                // 출력 가로채기 설정
                await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
                
                // 에디터 로드
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    editor = monaco.editor.create(document.getElementById('editor-container'), {
                        value: "print('Hello World!')",
                        language: 'python', theme: 'vs-dark', fontSize: 18, automaticLayout: true, minimap: { enabled: false }
                    });
                    document.getElementById('loader').style.display = 'none';
                });
            } catch (e) {
                document.getElementById('loader').innerText = "❌ 엔진 로딩 실패. 새로고침해 주세요.";
            }
        }

        async function runPython() {
            const consoleElement = document.getElementById('console');
            consoleElement.innerText = "실행 중...\n";
            try {
                // 스트링오 가 초기화
                await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.getValue());
                const out = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
                consoleElement.innerText = out || "실행 완료 (출력 내용 없음)";
            } catch (err) {
                consoleElement.innerText = "⚠️ 에러:\n" + err;
            }
        }

        init();
    </script>
</body>
</html>
