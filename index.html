<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jin's Python Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root { --main-color: #FFCF00; --bg-color: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; border-bottom: 2px solid #444; }
        .btn-run { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #editor-container { flex: 2; width: 100%; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; font-size: 16px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <header>
        <div style="color:var(--main-color); font-weight:bold;">Jin's Editor</div>
        <button id="run-btn" class="btn-run" onclick="runPython()">▶ 실행 (Run)</button>
    </header>

    <div id="editor-container"></div>
    <div id="console"># 파이썬 수업 준비 완료! (첫 실행 시 엔진을 불러옵니다)</div>

    <script>
        let pyodide = null;
        let editor = null;

        // [핵심] 페이지가 열리자마자 에디터부터 확 띄우기
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: "print('Hello World!')", // 진님 요청대로 한 줄만!
                language: 'python', 
                theme: 'vs-dark', 
                fontSize: 18, 
                automaticLayout: true, 
                minimap: { enabled: false }
            });
        });

        // 실행 버튼을 누를 때만 파이썬 엔진 로딩
        async function runPython() {
            const consoleElement = document.getElementById('console');
            const runBtn = document.getElementById('run-btn');

            try {
                if (!pyodide) {
                    consoleElement.innerText = "🐍 파이썬 엔진을 처음으로 불러오는 중입니다... (10~20초 소요)\n";
                    runBtn.disabled = true;

                    // 스크립트 태그를 동적으로 생성해서 로드 (순서 꼬임 방지)
                    const script = document.createElement('script');
                    script.src = "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js";
                    script.onload = async () => {
                        pyodide = await loadPyodide();
                        await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
                        runBtn.disabled = false;
                        executeCode();
                    };
                    document.head.appendChild(script);
                } else {
                    executeCode();
                }
            } catch (err) {
                consoleElement.innerText = "⚠️ 엔진 로드 실패: " + err;
                runBtn.disabled = false;
            }
        }

        async function executeCode() {
            const consoleElement = document.getElementById('console');
            consoleElement.innerText = "실행 중...\n";
            try {
                await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.getValue());
                const output = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
                consoleElement.innerText = output || "실행 완료 (출력 내용 없음)";
            } catch (err) {
                consoleElement.innerText = "⚠️ 에러 발생:\n" + err;
            }
        }
    </script>
</body>
</html>
