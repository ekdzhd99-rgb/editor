<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jin's Ultra Light Editor</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.2/full/pyodide.js"></script>
    <style>
        body { background: #1e1e1e; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        #code-input { width: 100%; height: 200px; background: #2d2d2d; color: #fff; border: 1px solid #444; font-size: 18px; padding: 10px; font-family: monospace; }
        button { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 10px; border-radius: 8px; cursor: pointer; }
        #output { background: #000; color: #00ff00; padding: 15px; margin-top: 15px; min-height: 100px; white-space: pre-wrap; border: 1px solid #333; font-family: monospace; }
        #status { color: #FFCF00; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status">🐍 엔진 로딩 중...</div>
    <textarea id="code-input">print('Hello World!')</textarea>
    <button id="run-btn" onclick="run()" disabled>잠시만 기다려주세요</button>
    <div id="output"># 결과가 여기에 나옵니다.</div>

    <script>
        let pyo = null;
        async function init() {
            try {
                pyo = await loadPyodide();
                await pyo.runPythonAsync("import sys, io\nsys.stdout = io.StringIO()");
                document.getElementById('status').innerText = "✅ 준비 완료!";
                document.getElementById('run-btn').innerText = "▶ 실행 (Run)";
                document.getElementById('run-btn').disabled = false;
            } catch(e) { document.getElementById('status').innerText = "❌ 오류: " + e; }
        }
        async function run() {
            const out = document.getElementById('output');
            out.innerText = "실행 중...";
            try {
                await pyo.runPythonAsync("sys.stdout = io.StringIO()");
                await pyo.runPythonAsync(document.getElementById('code-input').value);
                out.innerText = pyo.runPython("sys.stdout.getvalue()") || "실행 완료";
            } catch(e) { out.innerText = "⚠️ 에러:\n" + e; }
        }
        init();
    </script>
</body>
</html>
