<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jin's Python Editor</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.2/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root { --main-color: #FFCF00; --bg-color: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; border-bottom: 2px solid #444; }
        .btn-run { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-run:disabled { background: #555; cursor: not-allowed; }
        #editor-container { flex: 2; width: 100%; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; color: #00ff00; padding: 15px; font-family: 'Courier New', monospace; overflow-y: auto; font-size: 16px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <header>
        <div style="color:var(--main-color); font-weight:bold;">Jin's Editor</div>
        <button id="run-btn" class="btn-run" onclick="runPython()" disabled>로딩 중...</button>
    </header>

    <div id="editor-container"></div>
    <div id="console"># 파이썬 엔진을 준비하고 있습니다...</div>

    <script>
        let pyodide = null;
        let editor = null;

        // 404 에러를 방지하기 위한 환경 설정
        window.MonacoEnvironment = { getWorkerUrl: () => proxy };
        let proxy = URL.createObjectURL(new Blob([`
            self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/' };
            importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/base/worker/workerMain.js');
        `], { type: 'text/javascript' }));

        async function initApp() {
            const runBtn = document.getElementById('run-btn');
            const consoleBox = document.getElementById('console');

            try {
                // 1. 엔진 로드
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);

                // 2. 에디터 로드
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    editor = monaco.editor.create(document.getElementById('editor-container'), {
                        value: "print('Hello World!')", // 요청하신 대로 딱 한 줄만!
                        language: 'python', theme: 'vs-dark', fontSize: 18, 
                        automaticLayout: true, minimap: { enabled: false }
                    });
                    
                    runBtn.disabled = false;
                    runBtn.innerText = "▶ 실행 (Run)";
                    consoleBox.innerText = "# 준비 완료! 버튼을 눌러보세요.";
                });
            } catch (err) {
                consoleBox.innerText = "❌ 로딩 에러: " + err;
            }
        }

        async function runPython() {
            const consoleBox = document.getElementById('console');
            consoleBox.innerText = "실행 중...\n";
            try {
                await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.getValue());
                const output = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
                consoleBox.innerText = output || "실행 완료 (출력 없음)";
            } catch (err) {
                consoleBox.innerText = "⚠️ 에러 발생:\n" + err;
            }
        }

        initApp();
    </script>
</body>
</html>
