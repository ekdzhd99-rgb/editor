<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jin's Python Class</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root { --main-color: #FFCF00; --bg-color: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; border-bottom: 2px solid #444; }
        .btn-group { display: flex; gap: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-run { background: #4CAF50; color: white; }
        .btn-copy { background: var(--main-color); color: #000; }
        #editor-container { flex: 2; width: 100%; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; font-size: 16px; white-space: pre-wrap; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="loader">🐍 파이썬 엔진 준비 중...</div>
    <header>
        <div style="color:var(--main-color); font-weight:bold;">Jin's Class</div>
        <div class="btn-group">
            <button id="run-btn" class="btn-run" onclick="runPython()">▶ 실행 (Run)</button>
            <button class="btn-copy" onclick="copyCode()">📋 전체 복사</button>
        </div>
    </header>
    <div id="editor-container"></div>
    <div id="console"># 실행 결과가 여기에 표시됩니다.</div>

    <script>
        let pyodide = null;
        let editor = null;

        async function initApp() {
            try {
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
                
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    editor = monaco.editor.create(document.getElementById('editor-container'), {
                        value: "print('Hello World!')\n\n# 반복문 연습\nfor i in range(5):\n    print(i + 1, '번째 인사!')",
                        language: 'python', theme: 'vs-dark', fontSize: 18, automaticLayout: true, minimap: { enabled: false },
                        snippetSuggestions: "none", quickSuggestions: { other: true }
                    });
                    document.getElementById('loader').style.display = 'none';
                });
            } catch (err) {
                document.getElementById('loader').innerText = "❌ 엔진 로딩 실패";
            }
        }

        async function runPython() {
            const consoleElement = document.getElementById('console');
            consoleElement.innerText = "실행 중...\n";
            try {
                await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.getValue());
                const output = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
                consoleElement.innerText = output || "실행 완료";
            } catch (err) {
                consoleElement.innerText = "⚠️ 에러 발생:\n" + err;
            }
        }

        function copyCode() {
            const code = editor.getValue();
            navigator.clipboard.writeText(code).then(() => { alert("코드가 복사되었습니다!"); });
        }
        initApp();
    </script>
</body>
</html>
