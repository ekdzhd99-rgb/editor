<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jin's Final Editor</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.2/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        :root { --main-color: #FFCF00; --bg-color: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; border-bottom: 2px solid #444; }
        .btn-run { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-run:disabled { background: #555; cursor: not-allowed; }
        #editor-container { flex: 2; width: 100%; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; font-size: 16px; white-space: pre-wrap; }
        #loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-mask">
        <div style="font-size: 3rem; margin-bottom: 20px;">🐍</div>
        <div id="loading-status">엔진 로드 확인 중...</div>
    </div>

    <header>
        <div style="color:var(--main-color); font-weight:bold;">Jin's Class</div>
        <button id="run-btn" class="btn-run" onclick="runPython()" disabled>준비 중...</button>
    </header>

    <div id="editor-container"></div>
    <div id="console"># 실행 결과가 여기에 표시됩니다.</div>

    <script>
        let pyodide = null;
        let editor = null;

        // [핵심] 엔진이 로드되었는지 0.3초마다 체크하는 함수
        function bootSystem() {
            const status = document.getElementById('loading-status');
            
            // 만약 loadPyodide가 정의되었다면 초기화 시작
            if (typeof loadPyodide === 'function') {
                status.innerText = "파이썬 엔진을 깨우는 중...";
                initApp();
            } else {
                // 아직 로딩 중이라면 0.3초 뒤에 다시 체크
                setTimeout(bootSystem, 300);
            }
        }

        async function initApp() {
            const status = document.getElementById('loading-status');
            try {
                // 파이썬 엔진 실행
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);

                // 에디터 실행
                status.innerText = "에디터 화면 구성 중...";
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    editor = monaco.editor.create(document.getElementById('editor-container'), {
                        value: "print('Hello World!')", // 진님 요청대로 한 줄만!
                        language: 'python', theme: 'vs-dark', fontSize: 18, 
                        automaticLayout: true, minimap: { enabled: false },
                        snippetSuggestions: "none", quickSuggestions: { other: true }
                    });
                    
                    // 로딩 마스크 제거 및 버튼 활성화
                    document.getElementById('loading-mask').style.display = 'none';
                    const runBtn = document.getElementById('run-btn');
                    runBtn.disabled = false;
                    runBtn.innerText = "▶ 실행 (Run)";
                });
            } catch (err) {
                status.innerHTML = "❌ 부팅 실패<br><small>" + err + "</small>";
            }
        }

        async function runPython() {
            const consoleElement = document.getElementById('console');
            consoleElement.innerText = "실행 중...\n";
            try {
                await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.getValue());
                const out = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
                consoleElement.innerText = out || "실행 완료 (출력 없음)";
            } catch (err) {
                consoleElement.innerText = "⚠️ 에러:\n" + err;
            }
        }

        // 부팅 시작
        bootSystem();
    </script>
</body>
</html>
